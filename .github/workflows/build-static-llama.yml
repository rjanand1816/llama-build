name: Build Static llama-server ARM32 (musl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      TOOLCHAIN: /opt/musl
      BUILD_DIR: build-arm32

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install build tools
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            ninja-build \
            wget \
            xz-utils \
            file

      # 2. Download musl.cc ARM32 toolchain
      - name: Download musl toolchain
        run: |
          cd /tmp
          wget https://musl.cc/arm-linux-musleabi-cross.tgz
          sudo mkdir -p ${TOOLCHAIN}
          sudo tar -xzf arm-linux-musleabi-cross.tgz -C ${TOOLCHAIN} --strip-components=1

          echo "${TOOLCHAIN}/bin" >> $GITHUB_PATH

      # Verify compiler
      - name: Verify compiler
        run: |
          arm-linux-musleabi-gcc --version

      # 3. Clone llama.cpp
      - name: Clone llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git

      # Create CMake toolchain
      - name: Create toolchain
        run: |
          cat > toolchain-arm32-musl.cmake <<EOF
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm)

          set(CMAKE_C_COMPILER arm-linux-musleabi-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-musleabi-g++)

          set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)

          set(CMAKE_C_FLAGS "-static -fno-pie")
          set(CMAKE_CXX_FLAGS "-static -fno-pie")
          set(CMAKE_EXE_LINKER_FLAGS "-static -no-pie")
          EOF

      # 4. Configure
      - name: Configure
        run: |
          cmake -S llama.cpp \
                -B ${BUILD_DIR} \
                -G Ninja \
                -DCMAKE_TOOLCHAIN_FILE=toolchain-arm32-musl.cmake \
                -DBUILD_SHARED_LIBS=OFF \
                -DGGML_STATIC=ON \
                -DLLAMA_BUILD_SERVER=ON \
                -DLLAMA_BUILD_TESTS=OFF \
                -DLLAMA_BUILD_EXAMPLES=OFF

      # Build
      - name: Build llama-server
        run: |
          cmake --build ${BUILD_DIR} --target llama-server -j$(nproc)

      # 5. Verify binary
      - name: Verify binary
        run: |
          echo "===== FILE ====="
          file ${BUILD_DIR}/bin/llama-server

          echo
          echo "===== ELF HEADER ====="
          arm-linux-musleabi-readelf -h ${BUILD_DIR}/bin/llama-server

          echo
          echo "===== PROGRAM HEADERS ====="
          arm-linux-musleabi-readelf -l ${BUILD_DIR}/bin/llama-server

          echo
          echo "===== DYNAMIC SECTION ====="
          if arm-linux-musleabi-readelf -d ${BUILD_DIR}/bin/llama-server | grep NEEDED; then
            echo "Dynamic libraries detected!"
            exit 1
          fi

          if arm-linux-musleabi-readelf -l ${BUILD_DIR}/bin/llama-server | grep INTERP; then
            echo "Dynamic loader detected!"
            exit 1
          fi

          echo
          echo "✓ Binary is fully static."

      # Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-static-arm32-musl
          path: build-arm32/bin/llama-server
